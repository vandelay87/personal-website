<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akli Aissat</title>
    <link
      rel="preload"
      href="/src/assets/fonts/geist-sans-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/src/assets/fonts/geist-sans-latin-500-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script>
      try {
        var persistedTheme = localStorage.getItem('theme')
        var theme =
          persistedTheme ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.setAttribute('data-theme', theme)
      } catch (error) {}
    </script>
    <!--ssr-head-->
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
