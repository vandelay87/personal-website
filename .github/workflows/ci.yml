name: CI

# Verifies pull requests (including Dependabot dependency bumps) without
# deploying. The deploy workflow only runs on push to main, so without this
# PRs would merge with no checks at all.
on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # version comes from the "packageManager" field in package.json

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Lint
        run: pnpm lint

      - name: Check for stale descendant-selector workarounds
        run: pnpm check:descendant-selectors

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build:prod
